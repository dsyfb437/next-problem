{% extends "base.html" %}

{% block title %}注册 - NextProblem{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 60px auto;">
    <h2 style="margin-bottom: 24px; text-align: center;">注册</h2>

    <form method="post">
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" name="username" id="username" required>
        </div>

        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" name="password" id="password" required>
        </div>

        <div class="form-group">
            <label for="confirm_password">确认密码</label>
            <input type="password" name="confirm_password" id="confirm_password" required>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">注册</button>
    </form>

    <p style="text-align: center; margin-top: 16px; color: var(--text-light);">
        已有账号？<a href="{{ url_for('auth.login') }}" style="color: var(--primary);">立即登录</a>
    </p>
</div>
{% endblock %}
