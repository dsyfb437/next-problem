{% extends "base.html" %}

{% block title %}艾宾浩斯复习 - 智能刷题{% endblock %}

{% block content %}
<h2 style="margin-bottom: 20px;">艾宾浩斯复习</h2>

<div style="margin-bottom: 16px;">
    <form method="get" style="display: inline;">
        <select name="subject" onchange="this.form.submit()" style="padding: 6px 12px;">
            {% for s in subjects %}
                <option value="{{ s }}" {% if s == current_subject %}selected{% endif %}>{{ s }}</option>
            {% endfor %}
        </select>
    </form>
</div>

{% if questions %}
    {% for q in questions %}
    <div class="card" style="margin-bottom: 16px;">
        <div style="color: var(--text-light); font-size: 14px; margin-bottom: 8px;">
            {{ q.chapter }}
        </div>
        <div class="question-text" style="margin-bottom: 16px;">
            {{ q.question_text|safe }}
        </div>
        <form method="post" action="{{ url_for('review.answer_due') }}">
            <input type="hidden" name="qid" value="{{ q.id }}">
            <div class="form-group">
                <input type="text" name="answer" placeholder="请作答" required>
            </div>
            <button type="submit" class="btn btn-primary">提交</button>
        </form>
    </div>
    {% endfor %}
{% else %}
<div class="card" style="text-align: center; padding: 48px;">
    <p style="color: var(--text-light);">暂无需要复习的题目</p>
</div>
{% endif %}
{% endblock %}
