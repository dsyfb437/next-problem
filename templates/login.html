{% extends "base.html" %}

{% block title %}登录 - NextProblem{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 60px auto;">
    <h2 style="margin-bottom: 24px; text-align: center;">登录</h2>

    <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" name="username" id="username" required>
        </div>

        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" name="password" id="password" required>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">登录</button>
    </form>

    <p style="text-align: center; margin-top: 16px; color: var(--text-light);">
        还没有账号？<a href="{{ url_for('auth.register') }}" style="color: var(--primary);">立即注册</a>
    </p>
</div>
{% endblock %}
